<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/> <!-- 관리자 CSS -->
    <style>
        .logWrap form label {
            display: block;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .popup-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1001;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 팝업 박스 (기존 관리자 popup 스타일 확장) */
        .popup {
            background: #333;
            width: 90%;
            max-width: 420px;
            border-radius: 10px;
            padding: 2rem;
            color: var(--white);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.3s ease-out;
        }

        /* 팝업 타이틀 */
        #modal-title {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1.6rem;
            font-family: var(--f-St);
        }

        /* 팝업 본문 */
        .popup-body {
            font-size: 1.4rem;
            color: #ccc;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        /* 닫기 버튼 */
        .btn-close {
            background: var(--point-color);
            border: none;
            padding: 1rem 1.6rem;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-size: 1.4rem;
            width: 100%;
            text-align: center;
        }

        .btn-close:hover {
            opacity: 0.85;
        }

        /* 팝업 배경 오버레이 */
        #modal-backdrop {
            z-index: 1000; /* 팝업보다 아래 */
        }

        /* Fade-in 애니메이션 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: flex; /* ← 최초에는 숨김 */
        }

    </style>
  <script type="module" crossorigin src="../assets/main-_35WEb_X.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/main-gsZTbLZ0.css">
  <link rel="stylesheet" crossorigin href="../assets/style-BWJWr5B5.css">
</head>

<body>

<div id="main-content">
    <!-- 회원가입 화면 -->
    <div>
        <section class="logWrap" style="margin-top: 150px;">

            <form id="register-form">

                <h2>회원가입</h2>

                <!-- 아이디 -->
                <label for="adminId">아이디</label>
                <input type="text" id="adminId" required placeholder="아이디를 입력하세요"/>

                <!-- 비밀번호 -->
                <label for="password">비밀번호</label>
                <div class="password-container">
                    <input type="password" id="password" required placeholder="비밀번호 입력"/>
                    <span class="eyes" onclick="togglePw('password')">👁</span>
                </div>

                <!-- 비밀번호 확인 -->
                <label for="confirmPassword">비밀번호 확인</label>
                <div class="password-container">
                    <input type="password" id="confirmPassword" required placeholder="비밀번호 확인"/>
                    <span class="eyes" onclick="togglePw('confirmPassword')">👁</span>
                </div>

                <!-- 전화번호 -->
                <label for="number">전화번호</label>
                <input type="text" id="number" required
                       pattern="^01[0-9]{1}-?[0-9]{3,4}-?[0-9]{4}$"
                       title="010-1234-5678 형식으로 입력해주세요"
                       placeholder="010-0000-0000"/>

                <!-- 동의 체크 -->
                <div class="privacy" style="margin: 1rem 0;">
                    <input type="checkbox" id="privacyAgree" required>
                    <label for="privacyAgree">
                        <button type="button" onclick="openModal('privacy')" class="text-blue-600 underline">
                            개인정보 수집 및 이용
                        </button>
                        에 동의합니다. (필수)
                    </label>
                </div>

                <div class="privacy">
                    <input type="checkbox" id="kakaoAgree">
                    <label for="kakaoAgree">
                        <button type="button" onclick="openModal('kakao')" class="text-blue-600 underline">
                            카카오 알림톡 수신
                        </button>
                        동의 (선택)
                    </label>
                </div>

                <!-- 제출 버튼 -->
                <button type="submit" class="btn save-img" style="margin-top:20px; width:100%; justify-content:center;">
                    계정 생성
                </button>

                <p id="message" class="text-center mt-2"></p>
            </form>
        </section>
    </div>

</div>

<!-- 모달 배경 -->
<div id="modal-backdrop" class="popup-overlay" style="display: none"></div>

<!-- 모달 내용 -->
<div id="modal-content" class="popup-container" style="display: none">
    <div class="popup">
        <h2 id="modal-title"></h2>

        <div id="modal-body" class="popup-body"></div>

        <div class="popup-footer">
            <button onclick="closeModal()" class="btn-close">닫기</button>
        </div>
    </div>
</div>


<script>
    function togglePw(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
